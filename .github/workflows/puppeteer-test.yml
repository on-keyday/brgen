name: brgen-puppeteer-test
on:
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_call: null
  workflow_dispatch: null

permissions:
  contents: read

jobs:
  puppeteer-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Timeline
        uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: brgen-web-development
          path: "./web/public"
      - name: Install Dependencies
        run:
          | # see https://github.com/puppeteer/puppeteer/blob/38582e22822674138efa0d3dbe10a22bc0a33cad/docker/Dockerfile#L12
          sudo apt-get update
          sudo apt-get install -yq fonts-ipafont-gothic fonts-wqy-zenhei fonts-thai-tlwg fonts-khmeros fonts-kacst fonts-freefont-ttf dbus dbus-x11

      - name: Download rebrgen WASM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bmgen-web
          path: "./rebrgen-web"
      - name: Install rebrgen artifacts
        run: |
          chmod +x ./script/install_rebrgen_web.sh
          ./script/install_rebrgen_web.sh ./rebrgen-web

        # temporarily disable puppeteer tests due to flakiness
      - name: Test
        if: false
        run:
          | # see https://chromium.googlesource.com/chromium/src/+/main/docs/security/apparmor-userns-restrictions.md
          echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          cd astlib/ast2ts
          tsc || true # allow error
          cd ../../web/public
          cd ../dev
          npm install
          npx vite dev --port 8080 &
          sleep 5
          npm install puppeteer
          tsc || true # allow error
          TEST_ENV=github node test/puppet.mjs
