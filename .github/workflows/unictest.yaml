name: unictest (e2e)
run-name: unictest
on:
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  list-runners:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      runners: ${{ steps.list.outputs.runners }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: List runners
        id: list
        working-directory: rebrgen
        run: echo "runners=$(python script/list_unictest_runners.py)" >> "$GITHUB_OUTPUT"

  unictest-shard:
    needs: list-runners
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(needs.list-runners.outputs.runners) }}
    steps:
      - name: Timeline
        uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@7e868db0f3406270dd46e1dac26c65f621456723 # master
      - name: Set up Clang
        uses: egor-tensin/setup-clang@8092a31dc33b0c41ee7cc5bb81fd0267490a0161 # v2.2
        with:
          version: latest
          platform: x64
      - name: Install libc++-dev and libc++abi-dev
        run: sudo apt-get install libc++-dev libc++abi-dev -y
      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2
      - name: Download rebrgen tool
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rebrgen-native-tool
          path: rebrgen/tool
      - name: Download brgen tool
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: brgen-linux-llvm
          path: .
      - name: Test
        run: |
          export LD_LIBRARY_PATH=$(pwd)/tool:$(pwd)/rebrgen/tool:$LD_LIBRARY_PATH
          cp ./tool/libs2j.so ./rebrgen/tool/libs2j.so
          chmod -R +x tool/
          cd rebrgen
          chmod -R +x tool/
          cp build_config.template.json build_config.json
          python script/unictest.py --print-stdout --target-runner ${{ matrix.runner }} --parallel-limit 0 --output-json test_results.json || true
      - name: Upload shard result
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v8.0.0
        with:
          name: unictest-shard-${{ matrix.runner }}
          path: rebrgen/test_results.json

  unictest-merge:
    needs: unictest-shard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Timeline
        uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download shard results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: unictest-shard-*
          path: shards
      - name: Merge results
        run: |
          mkdir -p test_results
          python rebrgen/script/merge_unictest_results.py shards test_results/test_results.json
          cp script/unictest_result.html test_results/index.html
      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v8.0.0
        with:
          name: unictest-results
          path: test_results/
