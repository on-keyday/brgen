name: unictest (e2e)
run-name: unictest
on:
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  unictest-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Timeline
        uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@7e868db0f3406270dd46e1dac26c65f621456723 # master
      - name: Set up Clang
        uses: egor-tensin/setup-clang@471a6f8ef1d449dba8e1a51780e7f943572a3f99 # v2.1
        with:
          version: latest
          platform: x64
      - name: Install libc++-dev and libc++abi-dev
        run: sudo apt-get install libc++-dev libc++abi-dev -y
      - name: Download rebrgen tool
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rebrgen-native-tool
          path: rebrgen/tool
      - name: Download brgen tool
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: brgen-linux-llvm
          path: .
      - name: Test
        run: |
          export LD_LIBRARY_PATH=$(pwd)/tool:$(pwd)/rebrgen/tool:$LD_LIBRARY_PATH
          cp ./tool/libs2j.so ./rebrgen/tool/libs2j.so
          chmod -R +x tool/
          cd rebrgen
          chmod -R +x tool/
          cp build_config.template.json build_config.json
          python script/unictest.py --print-stdout --output-json test_results.json || true
          cd ..
          mkdir -p test_results
          mv rebrgen/test_results.json test_results/
          cp script/unictest_result.html test_results/index.html

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v8.0.0
        with:
          name: unictest-results
          path: test_results/

  update-readme:
    permissions:
      contents: write
    needs: unictest-linux
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unictest-results
          path: ignore/test_results
      - name: Update README.md with test results
        run: |
          python script/unictest_result_readme.py ignore/test_results/test_results.json > README.md
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: Update README.md with latest unictest results" || echo "No changes to commit"
          git push origin HEAD:main
