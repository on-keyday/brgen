name: Lint GitHub Actions Workflows
on: [ push, pull_request ]

permissions:
    contents: read
    pull-requests: write

jobs:
    sisakulint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install sisakulint
              run: |
                  curl -OL https://github.com/sisaku-security/sisakulint/releases/download/v0.2.11/sisakulint_0.2.11_linux_amd64.tar.gz 
                  tar -xzf sisakulint_0.2.11_linux_amd64.tar.gz -C /usr/local/bin
            - name: setup reviewdog
              uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f
              with:
                  reviewdog_version: latest
            - name: Run sisakulint with reviewdog
              env:
                  REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  sisakulint -format "{{sarif .}}" -ignore timeout-minutes | \
                  reviewdog -f=sarif -reporter=github-pr-review -filter-mode=nofilter
